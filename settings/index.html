<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Lumina</title>
<script type="application/javascript" src="/homey.js" data-origin="settings"></script>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 1.2em auto; padding: 0 1em; color: #222; }
  h2 { margin-top: 0; }
  h3 { margin: 1.2em 0 .4em; font-size: 1.05em; }
  .hint { color: #666; font-size: .9em; margin: .2em 0 .8em; }
  .field-row { display: flex; align-items: center; gap: .5em; margin: .3em 0; }
  .field-row label { flex: 1; color: #444; font-size: .9em; }
  .section-label { font-weight: 600; margin-top: .8em; margin-bottom: .2em; font-size: .9em; color: #444; }
  button { background: #f5f5f5; border: 1px solid #ccc; border-radius: 4px; padding: .4em .8em; cursor: pointer; font-size: .9em; }
  button:hover { background: #eee; }
  button.primary { background: #f59e0b; color: #fff; border-color: #f59e0b; }
  button.primary:hover { background: #e58e0a; }
  button.danger { color: #c00; }
  button.tertiary { background: transparent; border: none; color: #888; font-size: .85em; padding: .2em .5em; }
  input[type=number] { width: 110px; padding: .35em; border: 1px solid #ddd; border-radius: 4px; text-align: right; }
  input[type=text], select { padding: .4em; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
  .group-card { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 6px; padding: .8em 1em; margin: .6em 0; }
  .group-card h4 { margin: 0 0 .4em; }
  .group-card .actions { margin-top: 1em; display: flex; gap: .5em; justify-content: flex-end; }
  .color-row { display: flex; gap: .5em; align-items: center; margin: .25em 0; }
  .color-row label { flex: 1; color: #555; font-size: .9em; }
  .color-row .picker-wrap { display: flex; gap: .4em; align-items: center; }
  .color-row .picker-wrap.off > input[type=color] { visibility: hidden; }
  .curve-card { background: #fff; border: 1px solid #eee; border-radius: 6px; padding: .6em .8em; margin: .8em 0; }
  .curve-card .curve-meta { display: flex; gap: 1em; font-size: .8em; color: #666; margin-bottom: .2em; }
  .curve-card .curve-meta strong { color: #222; }
  .curve-card svg { width: 100%; height: auto; display: block; }
  .group-val { color: #999; font-size: .8em; margin-left: .5em; }
  .zone-row { padding: .3em 0; border-top: 1px solid #eee; }
  .zone-row:first-of-type { border-top: 0; }
  .zone-head { display: flex; align-items: center; gap: .6em; cursor: pointer; padding: .3em 0; }
  .zone-head .chev { font-size: .8em; color: #888; width: .8em; display: inline-block; }
  .zone-head .zone-bereich { flex: 1; font-weight: 600; }
  .zone-head .mode-pill { padding: .15em .5em; border-radius: 10px; font-size: .75em; background: #eee; color: #555; }
  .zone-head .mode-pill.day { background: #fef3c7; color: #92400e; }
  .zone-head .mode-pill.night { background: #1f2937; color: #f3f4f6; }
  .zone-head .mode-pill.off { background: #e5e7eb; color: #6b7280; }
  .zone-edit { display: none; padding: .6em .4em 0; }
  .zone-row.open .zone-edit { display: block; }
  .zone-row.open .zone-head .chev { transform: rotate(90deg); display: inline-block; }
  .exclude-section { margin: .8em 0 .2em; padding: .5em .6em; background: #fff; border: 1px solid #eee; border-radius: 6px; }
  .exclude-section .exclude-title { font-weight: 600; font-size: .9em; margin-bottom: .15em; }
  .exclude-section .exclude-hint { color: #888; font-size: .8em; margin-bottom: .4em; }
  .exclude-section .exclude-row { display: flex; align-items: center; gap: .5em; padding: .15em 0; font-size: .9em; }
  .exclude-section .exclude-empty { color: #999; font-size: .85em; padding: .2em 0; }
  #status { margin-top: 1em; padding: .6em; border-radius: 4px; font-size: .9em; display: none; }
  #status.ok { background: #efe; color: #060; display: block; }
  #status.error { background: #fee; color: #c00; display: block; }
  .empty-hint { color: #999; font-style: italic; padding: .4em 0; }
  .assign-row { display: flex; gap: .4em; align-items: center; margin: .8em 0 .2em; }
  .assign-row select { flex: 1; }
</style>
</head>
<body>

<h2 data-i18n="title">Lumina</h2>

<h3 data-i18n="globalTick">Global tick</h3>
<div class="field-row">
  <label data-i18n="intervalLabel">Update interval (seconds)</label>
  <input id="tickSeconds" type="number" min="30" max="1800" step="10" placeholder="300">
</div>
<p class="hint" data-i18n="intervalHint">How often the app recomputes the sun position.</p>
<div class="field-row">
  <label data-i18n="respectManualLabel">Respect manual changes</label>
  <input id="respectManualChanges" type="checkbox">
</div>
<p class="hint" data-i18n="respectManualHint">If a user changes a lamp manually, the app pauses that lamp until it is switched off and back on.</p>
<button class="primary" id="saveGlobals" data-i18n="save">Save</button>

<h3 data-i18n="groupsHeading">Groups</h3>
<p class="hint" data-i18n="groupsIntro">Groups bundle default values. Add Homey "Bereiche" to a group and Lumina will manage the lights inside.</p>
<div id="groups"></div>
<button id="addGroup" data-i18n="addGroup">+ New group</button>

<div id="status"></div>

<script type="text/javascript">
const I18N = {
  en: {
    title: 'Lumina',
    globalTick: 'Global tick',
    intervalLabel: 'Update interval (seconds)',
    intervalHint: 'How often the app recomputes the sun position. Lamps fade between updates, 300 s is fine.',
    respectManualLabel: 'Respect manual changes',
    respectManualHint: 'If a user changes a lamp manually, the app pauses that lamp until it is switched off and back on.',
    save: 'Save',
    saveFailed: 'Save failed: ',
    globalSaved: 'Global settings saved.',
    rangeError: 'Interval must be between 30 and 1800 seconds.',
    groupsHeading: 'Groups',
    groupsIntro: 'Groups bundle default values. Add Homey "Bereiche" to a group and Lumina will manage the lights inside.',
    addGroup: '+ New group',
    newGroupName: 'New group',
    defaultGroupName: 'Group',
    emptyGroups: 'No groups yet — create one.',
    sectionDay: 'Day',
    sectionNight: 'Night',
    nightColorLabel: 'Coloured night light instead of Kelvin',
    inheritedSwatchLabel: '→ inherits:',
    inheritedPrefix: 'inherits: ',
    inheritsArrow: '→ ',
    deleteBtn: 'Delete',
    deleteConfirm: 'Really delete group "{name}"?',
    groupSaved: 'Group "{name}" saved.',
    deleted: 'Group deleted.',
    deleteFailed: 'Delete failed: ',
    zonesHeading: 'Bereiche',
    noZonesInGroup: 'No Bereiche assigned to this group yet.',
    assignZonePrompt: '— pick a Bereich to assign here —',
    moveZonePrefix: 'currently: ',
    assignZoneBtn: 'Assign',
    noBereicheAvailable: 'No Bereiche available.',
    zoneModeLabel: 'Mode',
    modeOff: 'Off',
    modeDay: 'Adaptive',
    modeNight: 'Night',
    zoneSaveBtn: 'Save Bereich',
    zoneRemoveBtn: 'Remove',
    zoneRemoveConfirm: 'Remove "{name}" from Lumina?',
    zoneSaved: '"{name}" saved.',
    zoneRemoved: 'Bereich removed.',
    zoneSaveFailed: 'Save failed: ',
    zoneRemoveFailed: 'Remove failed: ',
    zoneNightColorLabel: 'Custom night colour (overrides group)',
    excludeLightsTitle: 'Excluded lights',
    excludeLightsHint: 'Tick the lamps Lumina should leave alone in this Bereich.',
    excludeLightsEmpty: 'No lamps resolved in this Bereich yet.',
    nowLabel: 'now',
    fieldsLoadFailed: 'Failed to load fields: ',
    zonesLoadFailed: 'Failed to load zones: '
  },
  de: {
    title: 'Lumina',
    globalTick: 'Globaler Tick',
    intervalLabel: 'Update-Intervall (Sekunden)',
    intervalHint: 'Wie oft die App den Sonnenstand neu berechnet. Lampen blenden zwischen Updates smooth, 300 s reichen.',
    respectManualLabel: 'Manuelle Änderungen respektieren',
    respectManualHint: 'Verändert ein Nutzer eine Lampe manuell, pausiert die App diese Lampe bis sie aus- und wieder eingeschaltet wird.',
    save: 'Speichern',
    saveFailed: 'Speichern fehlgeschlagen: ',
    globalSaved: 'Globale Einstellungen gespeichert.',
    rangeError: 'Intervall muss zwischen 30 und 1800 Sekunden liegen.',
    groupsHeading: 'Gruppen',
    groupsIntro: 'Gruppen bündeln Default-Werte. Weise einer Gruppe Homey-Bereiche zu und Lumina steuert die Lampen darin.',
    addGroup: '+ Neue Gruppe',
    newGroupName: 'Neue Gruppe',
    defaultGroupName: 'Gruppe',
    emptyGroups: 'Noch keine Gruppen — leg eine an.',
    sectionDay: 'Tag',
    sectionNight: 'Nacht',
    nightColorLabel: 'Farbiges Nachtlicht statt Kelvin',
    inheritedSwatchLabel: '→ erbt:',
    inheritedPrefix: 'erbt: ',
    inheritsArrow: '→ ',
    deleteBtn: 'Löschen',
    deleteConfirm: 'Gruppe "{name}" wirklich löschen?',
    groupSaved: 'Gruppe "{name}" gespeichert.',
    deleted: 'Gruppe gelöscht.',
    deleteFailed: 'Löschen fehlgeschlagen: ',
    zonesHeading: 'Bereiche',
    noZonesInGroup: 'Noch keine Bereiche in dieser Gruppe.',
    assignZonePrompt: '— Bereich dieser Gruppe zuweisen —',
    moveZonePrefix: 'aktuell: ',
    assignZoneBtn: 'Zuweisen',
    noBereicheAvailable: 'Keine Bereiche verfügbar.',
    zoneModeLabel: 'Modus',
    modeOff: 'Aus',
    modeDay: 'Adaptiv',
    modeNight: 'Nacht',
    zoneSaveBtn: 'Bereich speichern',
    zoneRemoveBtn: 'Entfernen',
    zoneRemoveConfirm: '"{name}" aus Lumina entfernen?',
    zoneSaved: '"{name}" gespeichert.',
    zoneRemoved: 'Bereich entfernt.',
    zoneSaveFailed: 'Speichern fehlgeschlagen: ',
    zoneRemoveFailed: 'Entfernen fehlgeschlagen: ',
    zoneNightColorLabel: 'Eigene Nachtfarbe (überschreibt Gruppe)',
    excludeLightsTitle: 'Ausgenommene Lampen',
    excludeLightsHint: 'Lampen anhaken, die Lumina in diesem Bereich in Ruhe lassen soll.',
    excludeLightsEmpty: 'In diesem Bereich sind noch keine Lampen aufgelöst.',
    nowLabel: 'jetzt',
    fieldsLoadFailed: 'Felder laden fehlgeschlagen: ',
    zonesLoadFailed: 'Bereiche laden fehlgeschlagen: '
  }
};
const LANG = (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';
function t(key, params) {
  const tpl = (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key;
  if (!params) return tpl;
  return tpl.replace(/\{(\w+)\}/g, (_, k) => (params[k] != null ? params[k] : '{' + k + '}'));
}
function fieldLabel(f) {
  return (f.label && (f.label[LANG] || f.label.en)) || f.key;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

const status = document.getElementById('status');
const setStatus = (msg, kind='ok') => { status.textContent = msg; status.className = kind; };

let groups = {};
let zones = [];          // [{bereichId, homeyZoneName, groupId, overrides, mode, excludedLights, members}]
let available = [];      // [{id, name}] -- Homey-Bereiche not yet configured
let FIELDS = [];
let HomeyRef = null;

// ----- groups (with zones nested) -----

function renderGroups() {
  const box = document.getElementById('groups');
  const gids = Object.keys(groups);
  if (!gids.length) {
    box.innerHTML = `<p class="empty-hint">${escapeHtml(t('emptyGroups'))}</p>`;
    return;
  }
  box.innerHTML = gids.map(gid => renderGroupCard(gid, groups[gid])).join('');
  for (const gid of gids) {
    const card = box.querySelector(`.group-card[data-id="${gid}"]`);
    wireGroupCard(card, gid);
  }
}

function renderGroupCard(gid, g) {
  const sections = { day: [], night: [] };
  for (const f of FIELDS) sections[f.section].push(f);
  const sectionTitle = { day: t('sectionDay'), night: t('sectionNight') };
  const sectionsHtml = Object.entries(sections).map(([sec, fields]) => {
    const fieldsHtml = fields.map(f =>
      `<div class="field-row">
        <label>${escapeHtml(fieldLabel(f))}${f.unit ? ' ('+f.unit+')' : ''}</label>
        <input type="number" data-key="${f.key}" min="${f.min}" max="${f.max}" value="${g[f.key] ?? f.defaultValue}">
      </div>`
    ).join('');
    const extra = sec === 'night' ? renderNightColorRow({ scope: 'g', hex: g.nightColor || '', labelOn: t('nightColorLabel') }) : '';
    return `<div class="section-label">${escapeHtml(sectionTitle[sec] || sec)}</div>${fieldsHtml}${extra}`;
  }).join('');

  // Zones in this group + assign row.
  const inGroup = zones.filter(z => z.groupId === gid);
  const zonesHtml = inGroup.length
    ? inGroup.map(renderZoneRow).join('')
    : `<div class="empty-hint">${escapeHtml(t('noZonesInGroup'))}</div>`;

  // The assign dropdown shows BOTH:
  //   - unconfigured Homey-Bereiche -> creates a new zone in this group
  //   - configured zones in OTHER groups -> reassigns to this group
  const elsewhere = zones.filter(z => z.groupId !== gid);
  const newOpts = available.map(z =>
    `<option value="new:${escapeHtml(z.id)}">${escapeHtml(z.name)}</option>`
  ).join('');
  const moveOpts = elsewhere.map(z =>
    `<option value="move:${escapeHtml(z.bereichId)}">${escapeHtml(z.homeyZoneName || z.bereichId)} (${escapeHtml(t('moveZonePrefix') + (groups[z.groupId]?.name || z.groupId))})</option>`
  ).join('');
  const assignDropdown = (newOpts || moveOpts)
    ? `<div class="assign-row">
        <select class="g-assign">
          <option value="">${escapeHtml(t('assignZonePrompt'))}</option>
          ${newOpts}
          ${moveOpts}
        </select>
      </div>`
    : `<div class="hint">${escapeHtml(t('noBereicheAvailable'))}</div>`;

  return `<div class="group-card" data-id="${escapeHtml(gid)}">
    <h4><input type="text" class="g-name" value="${escapeHtml(g.name || '')}"></h4>
    <div class="curve-card" data-curve>
      <div class="curve-meta">
        <span>${escapeHtml(t('nowLabel'))}: <strong class="curve-now">—</strong></span>
        <span>↑ <strong class="curve-sunrise">—</strong></span>
        <span>↓ <strong class="curve-sunset">—</strong></span>
      </div>
      <div class="curve-svg"></div>
    </div>
    ${sectionsHtml}
    <div class="section-label">${escapeHtml(t('zonesHeading'))}</div>
    ${zonesHtml}
    ${assignDropdown}
    <div class="actions">
      <button class="danger g-delete">${escapeHtml(t('deleteBtn'))}</button>
      <button class="primary g-save">${escapeHtml(t('save'))}</button>
    </div>
  </div>`;
}

function renderZoneRow(z) {
  const overrideFields = FIELDS.map(f => {
    const groupVal = groups[z.groupId]?.[f.key] ?? f.defaultValue;
    const ovr = z.overrides?.[f.key];
    return `<div class="field-row">
      <label>${escapeHtml(fieldLabel(f))}${f.unit ? ' ('+f.unit+')' : ''}</label>
      <input type="number" data-key="${f.key}" min="${f.min}" max="${f.max}"
             value="${ovr != null ? ovr : ''}"
             placeholder="${escapeHtml(t('inheritedPrefix') + groupVal)}">
      <span class="group-val">${escapeHtml(t('inheritsArrow'))}${groupVal}${f.unit || ''}</span>
    </div>`;
  }).join('');

  const groupInheritedColor = groups[z.groupId]?.nightColor || '';
  const colorRow = renderNightColorRow({
    scope: 'z',
    hex: typeof z.overrides?.nightColor === 'string' ? z.overrides.nightColor : '',
    labelOn: t('zoneNightColorLabel'),
    inheritedHex: groupInheritedColor,
  });

  return `<div class="zone-row" data-bereich-id="${escapeHtml(z.bereichId)}">
    <div class="zone-head">
      <span class="chev">▶</span>
      <span class="zone-bereich">${escapeHtml(z.homeyZoneName || z.bereichId)}</span>
      <span class="mode-pill ${escapeHtml(z.mode)}">${escapeHtml(t('mode' + z.mode.charAt(0).toUpperCase() + z.mode.slice(1)))}</span>
      <button class="tertiary z-remove">${escapeHtml(t('zoneRemoveBtn'))}</button>
    </div>
    <div class="zone-edit">
      <div class="field-row">
        <label>${escapeHtml(t('zoneModeLabel'))}</label>
        <select class="z-mode">
          <option value="off" ${z.mode === 'off' ? 'selected' : ''}>${escapeHtml(t('modeOff'))}</option>
          <option value="day" ${z.mode === 'day' ? 'selected' : ''}>${escapeHtml(t('modeDay'))}</option>
          <option value="night" ${z.mode === 'night' ? 'selected' : ''}>${escapeHtml(t('modeNight'))}</option>
        </select>
      </div>
      ${overrideFields}
      ${colorRow}
      <div class="curve-card" data-curve>
        <div class="curve-meta">
          <span>${escapeHtml(t('nowLabel'))}: <strong class="curve-now">—</strong></span>
          <span>↑ <strong class="curve-sunrise">—</strong></span>
          <span>↓ <strong class="curve-sunset">—</strong></span>
        </div>
        <div class="curve-svg"></div>
      </div>
      ${renderExcludeList(z)}
      <div class="actions">
        <button class="primary z-save">${escapeHtml(t('zoneSaveBtn'))}</button>
      </div>
    </div>
  </div>`;
}

function wireGroupCard(card, gid) {
  card.querySelector('.g-save').addEventListener('click', () => saveGroup(gid, card));
  card.querySelector('.g-delete').addEventListener('click', () => deleteGroup(gid));
  const colorOn = card.querySelector('.g-night-color-on');
  const wrap = card.querySelector('.color-row .picker-wrap');
  if (colorOn && wrap) {
    colorOn.addEventListener('change', () => wrap.classList.toggle('off', !colorOn.checked));
  }
  // Group-level curve preview updates as user types into the group's number fields.
  // We scope the selector to the group's IMMEDIATE inputs (not inside zone rows).
  card.querySelectorAll(':scope > .field-row input[type=number], :scope > [data-section] input[type=number]').forEach(() => {});
  // Simpler approach: any number input directly inside the group card (not a zone row).
  card.querySelectorAll('input[type=number]').forEach(inp => {
    // Only listen on group-level fields, not zone fields.
    if (inp.closest('.zone-row')) return;
    inp.addEventListener('input', () => refreshCurveDebounced(card.querySelector(':scope > [data-curve]') || card));
  });
  refreshCurve(card.querySelector(':scope > [data-curve]') || card);

  // Wire zone rows inside this group.
  card.querySelectorAll('.zone-row').forEach(row => {
    const bereichId = row.dataset.bereichId;
    const z = zones.find(z => z.bereichId === bereichId);
    if (!z) return;
    wireZoneRow(row, z);
  });

  // Wire the assign dropdown.
  const sel = card.querySelector('.g-assign');
  if (sel) {
    sel.addEventListener('change', () => {
      const v = sel.value;
      if (!v) return;
      const [op, bereichId] = v.split(':');
      const body = { bereichId, groupId: gid };
      if (op === 'new') body.mode = 'day';
      HomeyRef.api('POST', '/zones/upsert', body, (err) => {
        if (err) { setStatus(t('zoneSaveFailed') + err, 'error'); return; }
        fetchZones();
      });
    });
  }
}

function wireZoneRow(row, z) {
  const head = row.querySelector('.zone-head');
  head.addEventListener('click', (ev) => {
    if (ev.target.closest('.z-remove')) return;
    row.classList.toggle('open');
    if (row.classList.contains('open')) refreshCurve(row);
  });
  row.querySelector('.z-remove').addEventListener('click', (ev) => {
    ev.stopPropagation();
    removeZone(z);
  });
  row.querySelector('.z-save').addEventListener('click', () => saveZone(row, z));
  const colorOn = row.querySelector('.z-night-color-on');
  const wrap = row.querySelector('.color-row .picker-wrap');
  if (colorOn && wrap) {
    colorOn.addEventListener('change', () => wrap.classList.toggle('off', !colorOn.checked));
  }
  row.querySelectorAll('input[type=number]').forEach(inp => {
    inp.addEventListener('input', () => refreshCurveDebounced(row));
  });
}

function saveGroup(gid, card) {
  const updated = { name: card.querySelector('.g-name').value.trim() || t('defaultGroupName') };
  for (const f of FIELDS) {
    const el = card.querySelector(`:scope > .field-row input[data-key="${f.key}"], :scope > [data-section] input[data-key="${f.key}"]`);
    if (el) updated[f.key] = Number(el.value);
  }
  // Fallback: pick all number inputs at group level that aren't inside zone rows.
  if (Object.keys(updated).length <= 1) {
    card.querySelectorAll('input[type=number]').forEach(inp => {
      if (inp.closest('.zone-row')) return;
      if (inp.dataset.key) updated[inp.dataset.key] = Number(inp.value);
    });
  }
  const gColorOn = card.querySelector('.g-night-color-on');
  const gColorVal = card.querySelector('.g-night-color')?.value;
  if (gColorOn?.checked && /^#[0-9a-f]{6}$/i.test(gColorVal || '')) {
    updated.nightColor = gColorVal.toLowerCase();
  }
  groups[gid] = updated;
  HomeyRef.set('groups', groups, (err) => {
    if (err) { setStatus(t('saveFailed') + err, 'error'); return; }
    setStatus(t('groupSaved', { name: updated.name }), 'ok');
    renderGroups();
  });
}

function deleteGroup(gid) {
  HomeyRef.confirm(t('deleteConfirm', { name: groups[gid]?.name || gid }), 'warning', (err, ok) => {
    if (err || !ok) return;
    delete groups[gid];
    HomeyRef.set('groups', groups, (e) => {
      if (e) { setStatus(t('deleteFailed') + e, 'error'); return; }
      setStatus(t('deleted'), 'ok');
      renderGroups();
    });
  });
}

function addGroup() {
  const id = 'g-' + Date.now().toString(36);
  const defaults = {};
  for (const f of FIELDS) defaults[f.key] = f.defaultValue;
  groups[id] = { name: t('newGroupName'), ...defaults };
  HomeyRef.set('groups', groups, (err) => {
    if (err) { setStatus(t('saveFailed') + err, 'error'); return; }
    renderGroups();
  });
}

// ----- zone actions -----

function saveZone(row, z) {
  const mode = row.querySelector('.z-mode').value;
  const overrides = {};
  row.querySelectorAll('.field-row input[type=number]').forEach(inp => {
    const raw = inp.value.trim();
    if (raw === '') return;
    const n = Number(raw);
    if (Number.isFinite(n)) overrides[inp.dataset.key] = n;
  });
  const colorOn = row.querySelector('.z-night-color-on');
  const colorVal = row.querySelector('.z-night-color')?.value;
  if (colorOn?.checked && /^#[0-9a-f]{6}$/i.test(colorVal || '')) {
    overrides.nightColor = colorVal.toLowerCase();
  }
  const excludedLights = [];
  row.querySelectorAll('.z-exclude:checked').forEach(cb => {
    if (cb.dataset.lightId) excludedLights.push(cb.dataset.lightId);
  });
  const body = { bereichId: z.bereichId, mode, overrides, excludedLights };
  HomeyRef.api('POST', '/zones/upsert', body, (err) => {
    if (err) { setStatus(t('zoneSaveFailed') + err, 'error'); return; }
    setStatus(t('zoneSaved', { name: z.homeyZoneName || z.bereichId }), 'ok');
    fetchZones();
  });
}

function removeZone(z) {
  HomeyRef.confirm(t('zoneRemoveConfirm', { name: z.homeyZoneName || z.bereichId }), 'warning', (err, ok) => {
    if (err || !ok) return;
    HomeyRef.api('POST', '/zones/remove', { bereichId: z.bereichId }, (e) => {
      if (e) { setStatus(t('zoneRemoveFailed') + e, 'error'); return; }
      setStatus(t('zoneRemoved'), 'ok');
      fetchZones();
    });
  });
}

// ----- shared renderers -----

function renderNightColorRow({ scope, hex, labelOn, inheritedHex }) {
  const on = !!hex;
  const value = hex || inheritedHex || '#ff5500';
  const inheritHtml = inheritedHex
    ? `<span class="group-val" style="display:flex;align-items:center;gap:.3em;">
         ${escapeHtml(t('inheritedSwatchLabel'))}
         <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${escapeHtml(inheritedHex)};border:1px solid #ccc;"></span>
       </span>`
    : '';
  return `<div class="color-row">
    <label>
      <input type="checkbox" class="${scope}-night-color-on" ${on ? 'checked' : ''}>
      ${escapeHtml(labelOn)}
    </label>
    <div class="picker-wrap ${on ? '' : 'off'}">
      <input type="color" class="${scope}-night-color" value="${escapeHtml(value)}">
      ${inheritHtml}
    </div>
  </div>`;
}

function renderExcludeList(zone) {
  const members = Array.isArray(zone.members) ? zone.members : [];
  const excluded = new Set(zone.excludedLights || []);
  const body = members.length
    ? members.slice().sort((a, b) => (a.name || '').localeCompare(b.name || '')).map(m =>
        `<label class="exclude-row">
          <input type="checkbox" class="z-exclude" data-light-id="${escapeHtml(m.id)}" ${excluded.has(m.id) ? 'checked' : ''}>
          <span>${escapeHtml(m.name || m.id)}</span>
        </label>`).join('')
    : `<div class="exclude-empty">${escapeHtml(t('excludeLightsEmpty'))}</div>`;
  return `<div class="exclude-section">
    <div class="exclude-title">${escapeHtml(t('excludeLightsTitle'))}</div>
    <div class="exclude-hint">${escapeHtml(t('excludeLightsHint'))}</div>
    ${body}
  </div>`;
}

// ----- curve preview (shared between group and zone) -----

const curveTimers = new WeakMap();
function refreshCurveDebounced(host) {
  clearTimeout(curveTimers.get(host));
  curveTimers.set(host, setTimeout(() => refreshCurve(host), 200));
}

function refreshCurve(host) {
  // host can be either a .zone-row (zone preview) or a .group-card / its
  // direct curve-card container (group preview).
  let day, night;
  const zoneRow = host.closest ? host.closest('.zone-row') : null;
  if (zoneRow) {
    const bereichId = zoneRow.dataset.bereichId;
    const z = zones.find(z => z.bereichId === bereichId);
    const g = groups[z?.groupId] || {};
    day = {
      kelvinMin: numOrInherit(zoneRow, 'dayKelvinMin', g.dayKelvinMin),
      kelvinMax: numOrInherit(zoneRow, 'dayKelvinMax', g.dayKelvinMax),
      dimMin:    numOrInherit(zoneRow, 'dayDimMin',    g.dayDimMin),
      dimMax:    numOrInherit(zoneRow, 'dayDimMax',    g.dayDimMax),
    };
    night = {
      kelvin: numOrInherit(zoneRow, 'nightKelvin', g.nightKelvin),
      dim:    numOrInherit(zoneRow, 'nightDim',    g.nightDim),
    };
  } else {
    // Group-level: read directly from the group card's inputs (excluding zone-row inputs).
    const card = host.closest('.group-card') || host;
    const get = (key) => {
      for (const inp of card.querySelectorAll(`input[data-key="${key}"]`)) {
        if (!inp.closest('.zone-row')) return Number(inp.value);
      }
      return null;
    };
    day = {
      kelvinMin: get('dayKelvinMin'), kelvinMax: get('dayKelvinMax'),
      dimMin:    get('dayDimMin'),    dimMax:    get('dayDimMax'),
    };
    night = {
      kelvin: get('nightKelvin'), dim: get('nightDim'),
    };
  }
  HomeyRef.api('POST', '/curve', { day, night }, (err, data) => {
    if (err || !data) return;
    const target = (host.closest && host.closest('.zone-row'))
      ? host.querySelector('.zone-edit [data-curve]') || host.closest('.zone-row').querySelector('[data-curve]')
      : (host.closest('.group-card') || host).querySelector(':scope > [data-curve]');
    if (!target) return;
    target.querySelector('.curve-now').textContent = data.nowLabel;
    target.querySelector('.curve-sunrise').textContent = data.sunriseLabel || '—';
    target.querySelector('.curve-sunset').textContent = data.sunsetLabel || '—';
    target.querySelector('.curve-svg').innerHTML = renderCurveSvg(data, day);
  });
}

function numOrInherit(row, key, fallback) {
  const inp = row.querySelector(`input[data-key="${key}"]`);
  const raw = inp ? inp.value.trim() : '';
  const n = raw === '' ? null : Number(raw);
  return Number.isFinite(n) ? n : Number(fallback);
}

function renderCurveSvg(data, day) {
  const W = 320, H = 140;
  const padL = 8, padR = 8, padT = 14, padB = 24;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  const xForHour = (h) => padL + (h / 24) * innerW;
  const yForKelvin = (k) => padT + (1 - (k - 1500) / (6500 - 1500)) * innerH;
  const yForDim = (d) => padT + (1 - d / 100) * innerH;

  const baseY = padT + innerH;
  const kelvinPath = data.points.map((p, i) =>
    `${i === 0 ? 'M' : 'L'} ${xForHour(p.hour).toFixed(1)} ${yForKelvin(p.kelvin).toFixed(1)}`
  ).join(' ') + ` L ${xForHour(24).toFixed(1)} ${baseY} L ${xForHour(0).toFixed(1)} ${baseY} Z`;
  const dimPath = data.points.map((p, i) =>
    `${i === 0 ? 'M' : 'L'} ${xForHour(p.hour).toFixed(1)} ${yForDim(p.dimPct).toFixed(1)}`
  ).join(' ') + ` L ${xForHour(24).toFixed(1)} ${baseY} L ${xForHour(0).toFixed(1)} ${baseY} Z`;

  const idx = Math.min(data.points.length - 1, Math.max(0, Math.floor(data.nowHour * 4)));
  const nowPoint = data.points[idx];
  const nowX = xForHour(data.nowHour);

  const ticks = [0, 6, 12, 18, 24].map(h => {
    const x = xForHour(h);
    return `<text x="${x}" y="${H - 6}" text-anchor="middle" font-size="9" fill="#888">${h}</text>`;
  }).join('');

  const sunMark = (h, fill) => h == null ? '' :
    `<line x1="${xForHour(h).toFixed(1)}" y1="${baseY}" x2="${xForHour(h).toFixed(1)}" y2="${baseY + 6}" stroke="${fill}" stroke-width="2"/>`;

  return `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;">
      <path d="${dimPath}" fill="#cbd5e1" opacity="0.45"/>
      <path d="${kelvinPath}" fill="#f59e0b" opacity="0.75"/>
      <line x1="${padL}" y1="${baseY}" x2="${W - padR}" y2="${baseY}" stroke="#999" stroke-width="0.5"/>
      ${ticks}
      ${sunMark(data.sunriseHour, '#f59e0b')}
      ${sunMark(data.sunsetHour, '#475569')}
      <line x1="${nowX.toFixed(1)}" y1="${padT}" x2="${nowX.toFixed(1)}" y2="${baseY}" stroke="#111" stroke-width="1"/>
      <circle cx="${nowX.toFixed(1)}" cy="${yForKelvin(nowPoint.kelvin).toFixed(1)}" r="3" fill="#111"/>
      <text x="${nowX.toFixed(1)}" y="${padT - 2}" text-anchor="middle" font-size="9" fill="#111" font-weight="600">${nowPoint.kelvin}K / ${nowPoint.dimPct}%</text>
    </svg>
  `;
}

// ----- boot -----

function applyStaticI18n() {
  for (const el of document.querySelectorAll('[data-i18n]')) {
    el.textContent = t(el.dataset.i18n);
  }
}

function fetchZones() {
  HomeyRef.api('GET', '/zones', null, (e1, zs) => {
    if (e1) { setStatus(t('zonesLoadFailed') + e1, 'error'); return; }
    zones = zs || [];
    HomeyRef.api('GET', '/zones/available', null, (e2, av) => {
      if (e2) { setStatus(t('zonesLoadFailed') + e2, 'error'); return; }
      available = av || [];
      renderGroups();
    });
  });
}

function onHomeyReady(Homey) {
  HomeyRef = Homey;
  Homey.ready();
  applyStaticI18n();

  Homey.api('GET', '/fields', null, (err, fields) => {
    if (err) { setStatus(t('fieldsLoadFailed') + err, 'error'); return; }
    FIELDS = fields || [];

    Homey.get('tickSeconds', (e, v) => { if (!e && v != null) document.getElementById('tickSeconds').value = v; });
    Homey.get('respectManualChanges', (e, v) => { if (!e && v != null) document.getElementById('respectManualChanges').checked = v !== false; });
    Homey.get('groups', (e, g) => {
      groups = (typeof g === 'object' && g) ? g : {};
      fetchZones();
    });

    document.getElementById('saveGlobals').addEventListener('click', () => {
      const raw = document.getElementById('tickSeconds').value.trim();
      // Empty input -> fall back to the documented default rather than
      // forcing the user to type it.
      const tick = raw === '' ? 300 : Number(raw);
      if (!Number.isFinite(tick) || tick < 30 || tick > 1800) {
        setStatus(t('rangeError'), 'error');
        return;
      }
      const respect = document.getElementById('respectManualChanges').checked;
      Homey.set('tickSeconds', tick, () => {});
      Homey.set('respectManualChanges', respect, () => {});
      setStatus(t('globalSaved'), 'ok');
    });

    document.getElementById('addGroup').addEventListener('click', addGroup);
  });
}
</script>
